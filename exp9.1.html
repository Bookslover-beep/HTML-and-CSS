<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ffd6de, #d6f0ff);
    margin: 0;
}

.container {
    width: 420px;
    margin: 50px auto;
    background: #fff;
    padding: 25px 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

h2 {
    text-align: center;
    color: #444;
    margin-bottom: 20px;
}

label {
    font-weight: 600;
    display: block;
    margin-top: 10px;
}

input[type="text"],
input[type="email"],
input[type="tel"],
select,
textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 6px;
    transition: 0.3s;
}

input:focus,
select:focus,
textarea:focus {
    border-color: #ff6f91;
    outline: none;
    box-shadow: 0 0 5px rgba(255,111,145,0.5);
}

.options {
    margin-top: 5px;
}
.options input {
    margin-right: 6px;
}

input[type="submit"] {
    width: 100%;
    margin-top: 20px;
    background: linear-gradient(to right, #ff6f91, #ff9671);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

input[type="submit"]:hover {
    transform: scale(1.03);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div class="container">
    <h2>✨ Student Registration</h2>

    <form action="success.html">

        <label>First Name</label>
        <input type="text">

        <label>Middle Name</label>
        <input type="text">

        <label>Last Name</label>
        <input type="text">

        <label>Email</label>
        <input type="email">

        <label>Phone Number</label>
        <input type="tel">

        <label>Gender</label>
        <div class="options">
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Other
        </div>

        <label>Address</label>
        <textarea rows="2"></textarea>

        <label>College</label>
        <select>
            <option>---select---</option>
            <option>DYPCET College</option>
            <option>KIT College</option>
            <option>RIT College</option>
        </select>

        <label>Technical Skills</label>
        <div class="options">
            <input type="checkbox"> C
            <input type="checkbox"> C++
            <input type="checkbox"> Python
            <input type="checkbox"> Java
            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
        </div>

        <label>Additional Info</label>
        <textarea rows="3"></textarea>

        <input type="submit" value="Submit">

    </form>
</div>

</body>
</html>
