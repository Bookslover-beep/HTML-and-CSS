<!DOCTYPE html>
<html>
<head>
<title>My First Web Page</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #d0eaff, #e6f4ff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
        max-width: 400px;
    }

    h1 {
        color: #0a3d62;
        margin-bottom: 15px;
    }

    p {
        color: #333;
        font-size: 16px;
        line-height: 1.5;
    }

    .card:hover {
        transform: scale(1.03);
        transition: 0.3s;
    }
</style>

</head>
<body>

<div class="card">
    <h1>This is my first program of HTML.</h1>
    <p>I am learning HTML language and excited to create webpages.</p>
</div>

</body>
</html>
